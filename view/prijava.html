% rebase('osnovna.html', title='Prijava', random=random)

<div class="prijava-ovitek">
    <div class="prijava-vsebina">

        <h2 class="naslov">Prijava</h2>

        <!--prikaz napake, če obstaja-->
        % if defined('napaka') and napaka:
        <p style="color:red;">{{napaka}}</p>
        % end
        <!--prijavni obrazec-->
    <form method="post" action="/prijava/" class="prijava-forma">

        <div class="skupina">
            <label class="oznaka">Email</label>
            <input type="email" name="email" class="vnos" required>
        </div>

        <div class="skupina">
            <label class="oznaka">Geslo</label>
            <input type="password" name="geslo" class="vnos" required>
        </div>

        <div class="skupina">
            <button type="submit" class="gumb">Prijava</button>
        </div>

        <!--povezava na registracijo-->
        <div class="spodnja-povezava">
            <p>Še nimate računa? <a href="/registracija/">Registriraj se</a></p>
        </div>
    </form>
    </div>
</div>
