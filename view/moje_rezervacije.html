% rebase('osnovna.html', title='Moje rezervacije')

<h2>Moje rezervacije</h2>

<table>
    <tr>
        <th>Datum</th>
        <th>Začetek</th>
        <th>Konec</th>
    </tr>

    % for rez in rezervacije:

    <tr>
        <td>{{rez['datum']}}</td>
        <td>{{rez['ura_pricetka']}}</td>
        <td>{{rez['ura_konca']}}</td>
    </tr>

    % end
</table>
