% rebase('osnovna.html', title='Moje karte', ime=ime)

<h2>Moje karte</h2>

% if karte:
<table border="1">
    <tr>
        <th>Tip karte</th>
        <th>Velja do</th>
        <th>Preostali obiski</th>
    </tr>

    % for karta in karte:
    <tr>
        <td>{{karta.tip}}</td>
        <td>{{karta.velja_do}}</td>
        <td>{{karta.prosti_obiski}}</td>
    </tr>
    % end
</table>

% else:
<p>Nimaš aktivnih kart.</p>
% end

<br>
<a href="/ponudba/">Kupi novo karto</a>
